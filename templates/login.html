<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Hetzner PT流量管理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-box h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .checkbox-group {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            cursor: pointer;
        }
        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
            color: #555;
            font-weight: 500;
        }
        .duration-select {
            margin-bottom: 20px;
            display: none;
        }
        .duration-select label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .duration-select select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            background: #fff;
            cursor: pointer;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .error {
            color: #f44336;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🖥️ 登录</h1>
        <p id="error" class="error"></p>
        <form onsubmit="return login(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" required>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="remember_me">
                <label for="remember_me">记住我（保持登录状态）</label>
            </div>
            <div class="duration-select" id="duration_select">
                <label>保持登录时长</label>
                <select id="duration_days">
                    <option value="7">7天</option>
                    <option value="30">30天</option>
                </select>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
    </div>
    <script>
        // 监听"记住我"复选框变化
        document.getElementById('remember_me').addEventListener('change', function() {
            const durationSelect = document.getElementById('duration_select');
            durationSelect.style.display = this.checked ? 'block' : 'none';
        });

        async function login(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember_me = document.getElementById('remember_me').checked;
            const duration_days = parseInt(document.getElementById('duration_days').value);
            const errorEl = document.getElementById('error');

            try {
                const resp = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, remember_me, duration_days })
                });
                const data = await resp.json();

                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorEl.textContent = data.message;
                }
            } catch (e) {
                errorEl.textContent = '登录失败，请重试';
            }
            return false;
        }
    </script>
</body>
</html>
